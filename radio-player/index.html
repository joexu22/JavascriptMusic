<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Radio</title>
  <style>
    body { font-family: monospace; background: #0a0a0a; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .player { width: 400px; text-align: center; }
    .track-title { font-size: 1.2em; margin: 20px 0 4px; }
    .track-meta { font-size: 0.8em; color: #888; margin-bottom: 20px; }
    audio { width: 100%; margin: 16px 0; }
    .rating { display: flex; gap: 12px; justify-content: center; margin: 16px 0; }
    .rating button { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px 18px; cursor: pointer; font-size: 1.2em; border-radius: 4px; }
    .rating button:hover { background: #2a2a2a; }
    .rating button.active { border-color: #888; background: #2a2a2a; }
    .model-score { font-size: 0.75em; color: #555; margin-top: 8px; }
    .queue-info { font-size: 0.75em; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="player">
    <h2>Personal Radio</h2>

    <div class="track-title" id="track-title">No track loaded</div>
    <div class="track-meta" id="track-meta">—</div>

    <audio id="audio-player" controls></audio>

    <div class="rating">
      <button onclick="rate(1)">💀</button>
      <button onclick="rate(2)">👎</button>
      <button onclick="rate(3)">😐</button>
      <button onclick="rate(4)">👍</button>
      <button onclick="rate(5)">🔥</button>
    </div>

    <div class="model-score" id="model-score"></div>
    <div class="queue-info" id="queue-info"></div>

    <button onclick="nextTrack()" style="margin-top:16px; background:#1a1a1a; border:1px solid #333; color:#e0e0e0; padding:8px 24px; cursor:pointer; border-radius:4px;">
      Next →
    </button>
  </div>

  <script>
    // TODO: wire to taste-engine API (Flask/FastAPI backend)
    // API endpoints expected:
    //   GET  /api/next           → { id, title, url, bpm, key, model_score, uncertain }
    //   POST /api/rate           → { id, rating }
    //   GET  /api/queue/stats    → { pending, auto_passed, auto_failed }

    let currentTrack = null;

    async function loadNext() {
      // const res = await fetch('/api/next');
      // currentTrack = await res.json();
      // document.getElementById('audio-player').src = currentTrack.url;
      // document.getElementById('track-title').textContent = currentTrack.title;
      // document.getElementById('track-meta').textContent = `BPM: ${currentTrack.bpm} | Key: ${currentTrack.key}`;
      // document.getElementById('model-score').textContent = `Model confidence: ${currentTrack.model_score}`;
      document.getElementById('track-title').textContent = 'Backend not connected yet';
      document.getElementById('track-meta').textContent = 'Wire taste-engine/server.py to activate';
    }

    async function rate(score) {
      if (!currentTrack) return;
      await fetch('/api/rate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentTrack.id, rating: score })
      });
      nextTrack();
    }

    function nextTrack() {
      loadNext();
    }

    loadNext();
  </script>
</body>
</html>
